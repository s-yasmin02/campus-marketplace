apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-frontend-deployment
  labels:
    app: campus-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-frontend
  template:
    metadata:
      labels:
        app: campus-frontend
    spec:
      containers:
      - name: frontend-client
        image: s-yasmin02/campus-frontend:latest
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: campus-frontend-service
spec:
  type: NodePort
  selector:
    app: campus-frontend
  ports:
  - port: 5173
    targetPort: 5173
    nodePort: 32173
