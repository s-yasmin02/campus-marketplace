apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-backend-deployment
  labels:
    app: campus-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-backend
  template:
    metadata:
      labels:
        app: campus-backend
    spec:
      containers:
      - name: backend-service
        image: s-yasmin02/campus-backend:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: campus-backend-service
spec:
  type: ClusterIP
  selector:
    app: campus-backend
  ports:
  - port: 5000
    targetPort: 5000
